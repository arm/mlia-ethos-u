name: CI

on:
  pull_request:

env:
  PYTHON_VERSION: "3.10"
  UV_DEFAULT_INDEX: ${{ secrets.INTERNAL_PYPI_HOST && format('internal={0}', secrets.INTERNAL_PYPI_HOST) || '' }}
  UV_INDEX_INTERNAL_USERNAME: ${{ secrets.INTERNAL_PYPI_HOST && secrets.INTERNAL_PYPI_USERNAME || '' }}
  UV_INDEX_INTERNAL_PASSWORD: ${{ secrets.INTERNAL_PYPI_HOST && secrets.INTERNAL_PYPI_PASSWORD || '' }}

jobs:
  lint:
    name: Lint
    runs-on: ["${{ vars.UBUNTU_RUNNER }}", "X64"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ runner.os }}|${{ env.PYTHON_VERSION }}|${{ hashFiles('.pre-commit-config.yaml') }}
      - run: uv sync --no-sources --group dev
      - run: uv run pre-commit run --all-files

  build:
    name: Build
    runs-on: ["${{ vars.UBUNTU_RUNNER }}", "X64"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv build

  test_quick:
    name: Quick Tests
    runs-on: ["${{ vars.UBUNTU_RUNNER }}", "X64"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --no-sources --group test
      - run: |
          set -o pipefail
          uv run pytest -m "not slow" tests/ | tee coverage.txt
      - name: Publish coverage summary
        run: |
          {
            echo "## Coverage"
            echo ""
            echo '```text'
            tail -n 20 coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
