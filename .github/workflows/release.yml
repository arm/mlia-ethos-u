name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.10"
  UV_DEFAULT_INDEX: ${{ secrets.INTERNAL_PYPI_HOST && format('internal={0}', secrets.INTERNAL_PYPI_HOST) || '' }}
  UV_INDEX_INTERNAL_USERNAME: ${{ secrets.INTERNAL_PYPI_HOST && secrets.INTERNAL_PYPI_USERNAME || '' }}
  UV_INDEX_INTERNAL_PASSWORD: ${{ secrets.INTERNAL_PYPI_HOST && secrets.INTERNAL_PYPI_PASSWORD || '' }}

jobs:
  build_and_test_wheel:
    name: Build And Test Wheel
    runs-on: ["${{ vars.UBUNTU_RUNNER }}", "X64"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv build
      - run: uv sync --no-sources --no-install-project --group test
      - run: |
          set -o pipefail
          uv run --no-sync \
            --with dist/*.whl \
            -- pytest tests/ | tee coverage.txt
      - name: Publish coverage summary
        run: |
          {
            echo "## Coverage"
            echo ""
            echo '```text'
            tail -n 20 coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  publish_release:
    name: Publish Release
    runs-on: ["${{ vars.UBUNTU_RUNNER }}", "X64"]
    needs: build_and_test_wheel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv build
      - run: uv publish dist/*
        env:
          UV_PUBLISH_URL: ${{ secrets.PUBLISH_PYPI_HOST }}
          UV_PUBLISH_USERNAME: ${{ secrets.INTERNAL_PYPI_USERNAME || secrets.PUBLISH_PYPI_USERNAME }}
          UV_PUBLISH_PASSWORD: ${{ secrets.INTERNAL_PYPI_PASSWORD || secrets.PUBLISH_PYPI_PASSWORD }}
