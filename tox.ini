[tox]
envlist = test
isolated_build = true

[testenv:test]
description = Run the unit tests.
deps =
    pytest==8.3.2
    flaky~=3.8.1
    numpy==2.2.6
    tensorflow
    tf-keras
skip_install = true
sitepackages = true
setenv =
    PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
commands =
    python -m pytest {posargs:tests/}

[testenv:test_quick]
description = Run a quick version of the unit tests (no slow tests).
deps =
    {[testenv:test]deps}
skip_install = true
sitepackages = true
setenv =
    PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
commands =
    python -m pytest -m "not slow" {posargs:tests/}

[testenv:coverage]
description = Run the code coverage of the unit tests.
deps =
    {[testenv:test]deps}
    pytest-cov==5.0.0
skip_install = true
sitepackages = true
setenv =
    PYTEST_DISABLE_PLUGIN_AUTOLOAD=1
commands =
    python -m pytest --cov=mlia --cov-report term-missing --cov-fail-under=95 tests/

[testenv:{lint,lint_setup}]
description = Run and setup the pre-commit hooks.
# Re-use the same env for both lint and lint_setup
envdir={toxworkdir}/lint
deps =
    {[testenv:test]deps}
    mypy==1.5.1
    pylint==2.17.5
    pre-commit
    tomli
skip_install = true
# Pass the following environment variables:
# - HOME: Workaround for an issue with markdownlint in a docker environment
# - SKIP: Allows skipping of pre-commit hooks, e.g. "SKIP=reuse tox -e lint"
passenv =
    HOME
    SKIP
commands =
    lint_setup: pre-commit install-hooks
    lint: pre-commit run --all-files --hook-stage=push {posargs}

[testenv:build]
description = Build a wheel file (platform name as optional argument [manylinux2014_aarch64, manylinux2014_x86_64]).
deps =
    build~=1.2.1
passenv =
    MLIA_CUSTOM_TAG_SUFFIX
commands =
    python -m build --wheel --config-setting=--build-option=--plat-name={posargs:manylinux2014_x86_64}
