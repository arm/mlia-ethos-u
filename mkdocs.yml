site_name: MLIA Ethos-U
site_description: Documentation for the MLIA Ethos-U target and backend plugin.
repo_url: https://github.com/arm/mlia-ethos-u
repo_name: arm/mlia-ethos-u
edit_uri: edit/main/docs/source/
docs_dir: docs/source
site_dir: .mkdocs/site
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.share

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Target Profiles: target_profiles.md
  - Backends: backends.md
  - Outputs and Metrics: outputs_metrics.md
  - CLI: cli.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
